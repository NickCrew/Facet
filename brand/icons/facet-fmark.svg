<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 34 42" fill="none">
  <!-- Facet F-mark: Split F with 40° diagonal cut -->
  <defs>
    <clipPath id="upper"><path d="M0 0 H34 V42 L0 21 Z"/></clipPath>
    <clipPath id="lower"><path d="M0 21 L34 42 V42 H0 Z"/></clipPath>
  </defs>
  <!-- Light face (upper) -->
  <g clip-path="url(#upper)">
    <path d="M4 2 H28 V10 H13 V18 H24 V26 H13 V40 H4 Z" fill="#6cb8e8"/>
  </g>
  <!-- Shadow face (lower) -->
  <g clip-path="url(#lower)">
    <path d="M4 2 H28 V10 H13 V18 H24 V26 H13 V40 H4 Z" fill="#2d6a96"/>
  </g>
  <!-- Cut edge -->
  <line x1="0" y1="21" x2="34" y2="42" stroke="#7ac4f0" stroke-width="0.5" opacity="0.4"/>
</svg>
