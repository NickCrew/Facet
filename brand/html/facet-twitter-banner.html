<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facet — Twitter/X Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200..700&family=DM+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #050709; margin: 0; padding: 0; }

.banner {
  width: 1500px; height: 500px;
  background: #0a0c10;
  position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center; flex-direction: column;
}
.banner::before {
  content: ''; position: absolute;
  width: 900px; height: 600px; top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse at center, rgba(108,184,232,0.10) 0%, rgba(45,106,150,0.05) 35%, transparent 70%);
  pointer-events: none;
}
.facet-grid {
  position: absolute; inset: 0; opacity: 0.03;
  background-image: linear-gradient(40deg, #6cb8e8 1px, transparent 1px), linear-gradient(-40deg, #6cb8e8 1px, transparent 1px);
  background-size: 60px 60px; pointer-events: none;
}
.vignette {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(5,7,9,0.65) 100%);
  pointer-events: none;
}
.corner { position: absolute; z-index: 2; width: 32px; height: 32px; }
.corner-tl { top: 24px; left: 24px; border-top: 1px solid rgba(108,184,232,0.12); border-left: 1px solid rgba(108,184,232,0.12); }
.corner-tr { top: 24px; right: 24px; border-top: 1px solid rgba(108,184,232,0.12); border-right: 1px solid rgba(108,184,232,0.12); }
.corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid rgba(108,184,232,0.12); border-left: 1px solid rgba(108,184,232,0.12); }
.corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid rgba(108,184,232,0.12); border-right: 1px solid rgba(108,184,232,0.12); }

.content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; align-items: center; gap: 24px;
}
.lockup { display: flex; align-items: center; gap: 18px; }
.lockup-text {
  font-family: 'Instrument Serif', Georgia, serif;
  font-weight: 400; font-size: 88px; color: #e8ecf2;
  letter-spacing: 2px; line-height: 1;
}
.tagline {
  font-family: 'DM Mono', monospace; font-size: 16px;
  color: #5ba4d9; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.65;
}
.subtitle {
  font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 300;
  color: #6b7a8d; letter-spacing: 0.5px;
}
</style>
</head>
<body>
<div class="banner">
  <div class="facet-grid"></div>
  <div class="vignette"></div>
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>
  <div class="content">
    <div class="lockup">
      <svg width="70" height="102" viewBox="0 0 22 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 2 H16 L20 9 H2 Z" fill="#6cb8e8"/>
        <path d="M8 3.5 H14 L16.5 8 H5.5 Z" fill="#7ac4f0" opacity="0.25"/>
        <path d="M2 9 L11 31 L11 9 Z" fill="#2d6a96"/>
        <path d="M20 9 L11 31 L11 9 Z" fill="#4a94c8"/>
        <line x1="1.5" y1="9" x2="20.5" y2="9" stroke="#7ac4f0" stroke-width="0.5" opacity="0.5"/>
        <line x1="11" y1="2" x2="11" y2="31" stroke="#7ac4f0" stroke-width="0.35" opacity="0.25"/>
      </svg>
      <span class="lockup-text">Facet</span>
    </div>
    <div class="tagline">Same diamond · Different face</div>
    <div class="subtitle">Open-source career platform · Identity extraction · Level correction</div>
  </div>
</div>
</body>
</html>
